name: Build and Push OCI Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: bootc-test
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Build and Push Image with Rootful Podman
        run: |
          # 1. Execute the rootful podman build to preserve security xattrs
          sudo podman build \
            -f ./Containerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --cap-add=SYS_ADMIN \
            .
          
          # 2. Authenticate to the registry as root
          sudo podman login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

          # 3. Push the complete layers directly from the root storage graph
          sudo podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sudo podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Print image URL
        run: echo "Image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
